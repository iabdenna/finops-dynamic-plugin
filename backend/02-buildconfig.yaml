apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: finops-backend
  namespace: finops-plugin
spec:
  runPolicy: Serial
  source:
    type: Binary
    binary: {}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: finops-backend:latest
  triggers: []